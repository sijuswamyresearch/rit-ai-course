# Course Learning Outcomes
course_outcomes:
  - CO1: "Apply foundational principles of linear algebra, calculus, and probability to formulate machine learning models and optimization strategies."
  - CO2: "Implement and evaluate supervised and unsupervised classical machine learning algorithms using standard Python frameworks and structured datasets."
  - CO3: "Develop deep learning architectures, analyzing the performance impact of activation functions and loss configurations."
  - CO4: "Design and deploy end-to-end generative AI pipelines, including Retrieval-Augmented Generation (RAG) systems, utilizing modern deployment frameworks."

